services:
  bot:
    build: .
    image: agent-ai-bot:latest
    env_file: .env
    environment:
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
