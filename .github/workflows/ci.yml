name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-agent
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the lightweight deps needed for the safety/unit tests.
          # Full LLM dependencies are NOT needed for these tests because the
          # tests stub or directly import the affected modules.
          pip install pytest pytest-mock ruff

      - name: Lint changed safety / utility modules
        run: |
          python -m ruff check safety exceptions.py logging_config.py settings.py utils/async_utils.py tests

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v
